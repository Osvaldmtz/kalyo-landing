<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#4A1599"/>
      <stop offset="50%" style="stop-color:#7C3DE3"/>
      <stop offset="100%" style="stop-color:#9333EA"/>
    </linearGradient>
    <radialGradient id="glow1" cx="80%" cy="20%" r="50%">
      <stop offset="0%" style="stop-color:rgba(255,255,255,0.1)"/>
      <stop offset="100%" style="stop-color:rgba(255,255,255,0)"/>
    </radialGradient>
    <radialGradient id="glow2" cx="20%" cy="80%" r="40%">
      <stop offset="0%" style="stop-color:rgba(255,255,255,0.06)"/>
      <stop offset="100%" style="stop-color:rgba(255,255,255,0)"/>
    </radialGradient>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bg)"/>
  <rect width="1200" height="630" fill="url(#glow1)"/>
  <rect width="1200" height="630" fill="url(#glow2)"/>

  <!-- Kalyo Logo (text version) -->
  <g transform="translate(600, 200)" text-anchor="middle">
    <text font-family="'Playfair Display', Georgia, serif" font-size="96" font-weight="700" fill="#FFFFFF" letter-spacing="4">Kalyo</text>
  </g>

  <!-- Divider line -->
  <rect x="500" y="245" width="200" height="2" rx="1" fill="rgba(196,181,253,0.5)"/>

  <!-- Tagline -->
  <g transform="translate(600, 310)" text-anchor="middle">
    <text font-family="'Outfit', 'Helvetica Neue', sans-serif" font-size="36" font-weight="300" fill="rgba(255,255,255,0.9)" letter-spacing="1">Evalúa más. Documenta menos.</text>
  </g>
  <g transform="translate(600, 360)" text-anchor="middle">
    <text font-family="'Outfit', 'Helvetica Neue', sans-serif" font-size="40" font-weight="600" fill="#C4B5FD" letter-spacing="1">Trata mejor.</text>
  </g>

  <!-- Subtitle -->
  <g transform="translate(600, 430)" text-anchor="middle">
    <text font-family="'Outfit', 'Helvetica Neue', sans-serif" font-size="22" font-weight="400" fill="rgba(255,255,255,0.6)">Plataforma clínica para psicólogos · 91 tests validados · Reportes con IA</text>
  </g>

  <!-- Bottom badge -->
  <rect x="440" y="490" width="320" height="44" rx="22" fill="rgba(255,255,255,0.15)" stroke="rgba(255,255,255,0.25)" stroke-width="1"/>
  <g transform="translate(600, 518)" text-anchor="middle">
    <text font-family="'Outfit', 'Helvetica Neue', sans-serif" font-size="16" font-weight="600" fill="#FFFFFF" letter-spacing="1">kalyo.io · Agenda tu demo gratuita</text>
  </g>
</svg>
