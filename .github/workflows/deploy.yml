name: Deploy to Hostinger

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.SSH_PRIVATE_KEY_B64 }}" | base64 -d > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -p 65002 217.21.77.113 >> ~/.ssh/known_hosts

      - name: Deploy via rsync
        run: |
          rsync -avz \
            -e "ssh -i ~/.ssh/deploy_key -p 65002 -o StrictHostKeyChecking=no" \
            --exclude='.git' \
            --exclude='.github' \
            --exclude='scripts/' \
            --exclude='node_modules/' \
            --exclude='kalyo_landing_v6.html' \
            ./ \
            u704825833@217.21.77.113:/home/u704825833/domains/kalyo.io/public_html/
